# Root Login Notification - Mail configuration
# Changes to this file are applied immediately without restarting the module.

# Optional: custom recipient email address.
# If not set, falls back to the Jahia default mail recipient.
#recipient=security-team@example.com

# Optional: custom sender email address.
# If not set, falls back to the Jahia default mail sender.
#sender=jahia-alerts@example.com

# Email subject template.
# Available tokens: {server} (server hostname), {site} (Jahia site key)
subject=[{server} - {site}] Connection notification to the root account

# Email body template.
# Available tokens: {ip} (client IP address), {time} (login timestamp)
body=<p>Hi,</p><p>We're sending this email following a successful connection to the root user.</p><p>Connection IP: {ip}<br>Connection time: {time}</p><p>This email is meant to raise awareness about the security of your services and to help you to protect them.</p><p>Regards,</p>
